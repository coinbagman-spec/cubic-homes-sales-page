<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubic Homes | Architectural Mastery in Motion</title>
    
    <!-- CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Archivo:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #BC6C25;
            --bg: #000000;
            --text: #ffffff;
            --transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* CONFIGURATION EDITABLE AT TOP */
        /* scrollDistance: 3500 */
        /* smoothness: 0.1 */
        /* enableSnap: true */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Archivo', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .scroll-container {
            width: 100%;
        }

        #hero-section {
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            pointer-events: none;
            padding: 0 20px;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.9;
            letter-spacing: -0.04em;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(50px);
        }

        .hero-title span {
            color: var(--accent);
            font-style: italic;
        }

        .hero-sub {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: rgba(255,255,255,0.5);
            opacity: 0;
            transform: translateY(30px);
        }

        /* UI ELEMENTS */
        .ui-container {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            z-index: 20;
            padding: 0 50px;
            pointer-events: none;
        }

        .progress-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            position: relative;
            backdrop-filter: blur(5px);
        }

        .progress-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.1s ease;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .stat-group {
            display: flex;
            gap: 40px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.3);
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat span:last-child {
            color: #fff;
        }

        .percent-display {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 8vw, 6rem);
            color: rgba(255,255,255,0.05);
            line-height: 1;
        }

        /* LOADING */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 1s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }

        /* CONTENT SECTION BELOW */
        .content-section {
            padding: 200px 50px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }

        .content-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin-bottom: 30px;
        }

        .content-section p {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.8;
            max-width: 700px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .ui-container { padding: 0 20px; }
            .stat-group { display: none; }
            .hero-title { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Initializing Vision</div>
    </div>

    <div class="scroll-container">
        <section id="hero-section">
            <canvas id="video-canvas"></canvas>
            
            <div class="overlay">
                <p class="hero-sub">Architectural Mastery in Motion</p>
                <h1 class="hero-title">CUBIC <span>EVOLUTION</span></h1>
            </div>

            <div class="ui-container">
                <div class="progress-wrapper">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progress-fill"></div>
                    </div>
                    <div class="stats-row">
                        <div class="stat-group">
                            <div class="stat"><span>Velocity</span><span>Normal</span></div>
                            <div class="stat"><span>Rendering</span><span>60FPS</span></div>
                            <div class="stat"><span>Status</span><span>Active</span></div>
                        </div>
                        <div class="percent-display" id="percent-text">0%</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="content-section">
            <h2>The Future of Living</h2>
            <p>Experience the ultimate fusion of form and function. Our Shou Sugi Ban tiny homes are crafted with precision, designed for longevity, and built to inspire.</p>
        </section>
    </div>

    <script>
        // CONFIGURATION
        const CONFIG = {
            scrollDistance: 3500,
            smoothness: 0.1,
            enableSnap: true,
            videoUrl: 'https://firebasestorage.googleapis.com/v0/b/blink-451505.firebasestorage.app/o/user-uploads%2FCyxsNSpMu1anUS4UmoThcBAEH0a2%2FFINALVIDEOHOMEstep1__92b5459e.mp4?alt=media&token=8471ae9b-304a-451c-adf6-74b7751ba7d1'
        };

        // SETUP GSAP
        gsap.registerPlugin(ScrollTrigger);

        // SETUP LENIS (Smooth Scroll)
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smoothWheel: true,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // CANVAS RENDERING
        const canvas = document.getElementById('video-canvas');
        const context = canvas.getContext('2d', { alpha: false });
        const video = document.createElement('video');
        
        video.src = CONFIG.videoUrl;
        video.muted = true;
        video.playsInline = true;
        video.preload = 'auto';
        
        const loader = document.getElementById('loader');
        const progressFill = document.getElementById('progress-fill');
        const percentText = document.getElementById('percent-text');

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            renderFrame();
        }

        function renderFrame() {
            if (!video.videoWidth) return;
            
            const videoRatio = video.videoWidth / video.videoHeight;
            const canvasRatio = canvas.width / canvas.height;
            
            let drawWidth, drawHeight, offsetX, offsetY;

            if (videoRatio > canvasRatio) {
                drawHeight = canvas.height;
                drawWidth = canvas.height * videoRatio;
                offsetX = (canvas.width - drawWidth) / 2;
                offsetY = 0;
            } else {
                drawWidth = canvas.width;
                drawHeight = canvas.width / videoRatio;
                offsetX = 0;
                offsetY = (canvas.height - drawHeight) / 2;
            }

            context.drawImage(video, offsetX, offsetY, drawWidth, drawHeight);
        }

        window.addEventListener('resize', resize);

        video.addEventListener('loadedmetadata', () => {
            resize();
            gsap.to(loader, { opacity: 0, duration: 1, onComplete: () => loader.style.display = 'none' });
            
            // INITIAL ANIMATIONS
            gsap.to('.hero-sub', { opacity: 1, y: 0, duration: 1, delay: 0.5 });
            gsap.to('.hero-title', { opacity: 1, y: 0, duration: 1, delay: 0.7 });

            // SCROLL SCUBBING
            ScrollTrigger.create({
                trigger: '#hero-section',
                start: 'top top',
                end: `+=${CONFIG.scrollDistance}`,
                pin: true,
                scrub: 1,
                onUpdate: (self) => {
                    const p = self.progress;
                    video.currentTime = p * video.duration;
                    progressFill.style.width = `${p * 100}%`;
                    percentText.innerText = `${Math.round(p * 100)}%`;
                }
            });

            // PARALLAX TEXT
            gsap.to('.overlay', {
                y: -100,
                scrollTrigger: {
                    trigger: '#hero-section',
                    start: 'top top',
                    end: 'bottom top',
                    scrub: true
                }
            });
        });

        // HIGH PERFORMANCE LOOP
        function update() {
            renderFrame();
            requestAnimationFrame(update);
        }
        update();

        // ACCESSIBILITY
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown') window.scrollBy(0, 100);
            if (e.key === 'ArrowUp') window.scrollBy(0, -100);
        });

    </script>
</body>
</html>
